name: china_rmi_tracker
description: >
  GEM's own "China Independent Oil Refinery Tracker for RMI". This is the SCHEMA TEMPLATE
  the whole project's gem_schema.md is derived from, and it is China seed data. Because it
  is GEM-authored it is SEED ONLY — never a citation.
source_tier: 2
citable: false          # GEM-authored: NEVER a [ref]; used to seed rows + prove out the schema

format: xlsx            # exported from the Google Sheet; the Refineries tab is already the GEM schema
location:
  # Google Sheet exported to xlsx; "Refineries" tab. Sibling tabs: Data Dictionary,
  # "Extra facilities (out of scope)" (43 rows — a Phase-B scope signal), Capacity Conversion.
  drive_file_id: "1PyNUtGUDLdY1chJ-MkzzgV_OnAcNTp2QlIq8jLhStPw"
  file_path: "data/china_independent_refinery_tracker.xlsx"   # gitignored; export before ingest
  sheet: "Refineries"
  header_row: 0
  # NOTE (2026-07-13): this drive_file_id is the "...for RMI" EXPORT. GEM also keeps a separate
  # live working sheet (drive_file_id 1sUPi1NqPnEUVky-09G7uxDyj2TL3HhAssIbkJMpLq2s). As of this
  # date the two are DATA-IDENTICAL on the Refineries tab (same 101 rows, 0 field diffs across
  # Status/Capacity/Owner/StartYear/Configuration), so we keep pointing at the "for RMI" export
  # by Baird's call (leave-as-is). If that live working sheet later diverges, re-export from
  # THAT file_id.
  # Both are GEM-authored → seed only, NEVER citable, regardless of which one is used.

id_field: "RefineryID"

# China-only tracker with no Country column — stamp it so rows carry a blocking key
# (match.py blocks the coordless OGJ on country) and a real country in the main.
defaults:
  country: "China"
  iso3: "CHN"

# Already close to the GEM schema; map its columns straight to canonical:
column_map:
  source_id:      "RefineryID"
  name:           "RefineryName"
  status:         "Status"
  owner:          "Owner"
  capacity_value: "Capacity"
  capacity_units: "CapacityUnits"     # NOTE: values like "tttpa" == 万吨/a (10,000 t/yr) — see capacity_units.md
  configuration:  "Configuration"
  start_year:     "StartYear"
  city:           "City"
  subnational:    "Province"
  latitude:       "Latitude"
  longitude:      "Longitude"

status_map:
  Operating:   "operating"
  Operational: "operating"
  Mothballed:  "mothballed"
  Retired:     "retired"

configuration_map:
  "hydroskimming":     "hydroskimming"
  "medium conversion": "medium conversion"
  "deep conversion":   "deep conversion"

notes: >
  The `CapacityInKbpd` in this tracker already resolves the 万吨/tttpa unit (750 tttpa =
  150.75 kbpd = 7.5 Mt/a). Keep the tracker's own kbpd as a cross-check but re-derive via
  capacity_normalize.py. `Is_In_RMI_20230508` flags overlap with RMI — use it to pre-link
  china_rmi_tracker rows to rmi rows during merge. Chinese names/ownership columns exist
  in the source; ingest drops them (worldwide schema is English-only).
