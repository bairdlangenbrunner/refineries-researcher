name: ogim
description: >
  OGIM v2.7 (Oil & Gas Infrastructure Mapping database) — Crude_Oil_Refineries layer, 692
  point features. Strongest for coordinate/location corroboration; also carries BOTH design
  capacity and throughput (the design-vs-throughput cross-check).
source_tier: 2
citable: true           # RULING (Baird 2026-07-13): OGIM is citable — published GIS dataset, not a GEM surface; re-verify each value/URL (SRC_REF_ID points into OGIM's own registry, so cite the OGIM record/dataset)

format: gpkg
location:
  file_path: "/Users/baird/Dropbox/_gis-data/ogim/OGIM_v2.7.gpkg"   # 3 GB multi-layer gpkg (gitignored; read single layer)
  layer: "Crude_Oil_Refineries"                                      # 692 features; siblings: LNG_Facilities, Petroleum_Terminals

id_field: "OGIM_ID"

# Confirmed against OGIM_v2.7.gpkg schema (Crude_Oil_Refineries layer):
column_map:
  source_id:      "OGIM_ID"
  name:           "FAC_NAME"
  country:        "COUNTRY"
  subnational:    "STATE_PROV"
  latitude:       "LATITUDE"
  longitude:      "LONGITUDE"
  capacity_value: "LIQ_CAPACITY_BPD"     # design/nameplate capacity, barrels/day
  status:         "OGIM_STATUS"          # also FAC_STATUS; both carry many "N/A"
  owner:          "OPERATOR"
  start_year:     "INSTALL_DATE"         # date string; ingest/adapter parses the year
  source_url:     "SRC_REF_ID"           # an ID into OGIM's Data_Catalog, NOT a URL — never a direct [ref]

capacity_units: "bpd"

# OGIM_STATUS profiled at ingest: N/A 548, OPERATIONAL 141, OTHER 2, INACTIVE 1 (of 692).
# 79% "N/A" — so OGIM is a LOCATION source, not a status source; blank out the non-signal.
status_map:
  OPERATIONAL: "operating"
  INACTIVE:    "idle"
  "N/A":       null      # unknown — leave status blank rather than assert
  OTHER:       null

# INSTALL_DATE is 1900-01-01 for 680/692 rows (unknown-date placeholder) — null it.
start_year_sentinels: [1900]

notes: >
  FAC_NAME is often the CITY/place, not the refinery's proper name (e.g. 4 distinct
  "ANTWERP" rows at 4 coords/capacities; "SKIKDA", "GOTHENBURG") — so OGIM names are
  low-quality and always lose the RefineryName tie to rmi/ogj/china; match on coords.
  LIQ_THROUGHPUT_BPD is 100% -999 (empty) — NO design-vs-throughput cross-check is
  possible from this layer; only LIQ_CAPACITY_BPD (design, 600/692 real) is usable.
  Not in canonical: FAC_TYPE/COMMODITY/ON_OFFSHORE/FAC_STATUS/NUM_STORAGE_TANKS
  (NUM_STORAGE_TANKS all 0). FAC_TYPE flags a few scope oddities (2 asphalt refineries,
  1 upgrader, 1 shale unit, 1 lubricants); ON_OFFSHORE is unreliable (tags Rotterdam/Lake
  Charles "OFFSHORE"). SRC_REF_ID = one of only 27 catalog IDs (not URLs) → OGIM is
  LOCATION corroboration; chase the named upstream source for citations.
